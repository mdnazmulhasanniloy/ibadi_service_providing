apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-format
spec:
  replicas: 2
  selector:
    matchLabels:
      app: project-format
  template:
    metadata:
      labels:
        app: project-format
    spec:
      containers:
        - name: app
          image: nazmulhasn/prisma_project_format:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
            - containerPort: 5005
          env:
            - name: DATABASE_URL
              value: "mongodb+srv://car-doctor:car-doctor@cluster0.pyj8wdj.mongodb.net/test?retryWrites=true&w=majority"
            - name: REDIS_HOST
              value: "redis-service"
            - name: REDIS_PORT
              value: "6379"

---
apiVersion: v1
kind: Service
metadata:
  name: project-format-service
spec:
  selector:
    app: project-format
  ports:
    - name: api
      protocol: TCP
      port: 5000
      targetPort: 5000
    - name: socket
      protocol: TCP
      port: 5005
      targetPort: 5005
  type: LoadBalancer

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          ports:
            - containerPort: 6379
          command: ["redis-server", "--appendonly", "yes"]

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
spec:
  selector:
    app: redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
  type: ClusterIP