services:
  app:
    image: nazmulhasn/prisma_project_format:latest
    container_name: prisma_project_format
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=mongodb+srv://car-doctor:car-doctor@cluster0.pyj8wdj.mongodb.net/test?retryWrites=true&w=majority
      - REDIS_HOST=prisma_project_format_redis
      - REDIS_PORT=6379
    ports:
      - "5000:5000"
      - "5005:5005"
    depends_on:
      - redis

  redis:
    image: redis:7.2-alpine
    container_name: prisma_project_format_redis
    restart: always
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  redis-data:

